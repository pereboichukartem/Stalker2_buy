    <script>
document.addEventListener('DOMContentLoaded', () => {

    const langBtn = document.querySelector('.lang-btn');
    const langMenu = document.querySelector('.lang-menu');
    const currentLangText = document.querySelector('.current-lang');
    const langLinks = document.querySelectorAll('.lang-menu a');

    const translations = {

        "Українська": {

            navHome: "Головна",
            navAbout: "Про гру",
            navBuy: "Купити",

            pageTitle: "КУПИТИ",

            editions: "ВИДАННЯ",

            buyBtn: "КУПИТИ"

        },

        "English": {

            navHome: "Home",
            navAbout: "About",
            navBuy: "Buy",

            pageTitle: "BUY",

            editions: "EDITIONS",

            buyBtn: "BUY NOW"

        },

        "Polski": {

            navHome: "Główna",
            navAbout: "O grze",
            navBuy: "Kup",

            pageTitle: "KUP",

            editions: "EDYCJE",

            buyBtn: "KUP TERAZ"

        }

    };

    langBtn.addEventListener('click', () => {

        langMenu.classList.toggle('show');

    });

    function applyLanguage(lang) {

        const t = translations[lang];

        currentLangText.textContent = lang;

        const nav = document.querySelectorAll('.header-nav a');

        nav[0].textContent = t.navHome;
        nav[1].textContent = t.navAbout;
        nav[2].textContent = t.navBuy;

        document.querySelector('.hero h1').textContent =
            t.pageTitle;

        document.querySelector('.section-title').textContent =
            t.editions;

        document.querySelectorAll('.btn-text')
            .forEach(btn => {

                btn.textContent = t.buyBtn;

            });

        localStorage.setItem('siteLanguage', lang);

    }

    langLinks.forEach(link => {

        link.addEventListener('click', (e) => {

            e.preventDefault();

            applyLanguage(link.textContent.trim());

        });

    });

    const savedLang =
        localStorage.getItem('siteLanguage');

    if (savedLang) {

        applyLanguage(savedLang);

    }

});
</script>

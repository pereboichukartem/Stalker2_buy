<!DOCTYPE html>
<html lang="uk">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ENTER THE ZONE</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">

</head>
<body>

    <!-- VIDEO -->

    <video autoplay muted loop playsinline class="bg-video">
        <source src="assets/video/bg.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <!-- NAVBAR -->

    <nav>

        <!-- SVG LOGO IMAGE -->

        <img src="assets/img/logo.svg" alt="Logo" class="logo">

        <ul>
            <li><a href="#">Головна</a></li>
            <li><a href="#">Світ</a></li>
            <li><a href="#">Фракції</a></li>
        </ul>

    </nav>

    <!-- HERO -->

    <section class="hero">

        <h1>ENTER THE ZONE</h1>

        <p>Небезпечний світ після катастрофи</p>

        <div class="buy-wrapper">

    <!-- BUTTON -->

    <a class="stalker-btn" href="#">

        <span class="btn-accent">
            ☢
        </span>

        <span class="btn-text">
            В БАЖАНЕ
        </span>

        <span class="btn-arrow">
            ▲
        </span>

    </a>

    <!-- DROPDOWN -->

    <div class="buy-menu">

        <a href="#">
            <img src="steam.svg" alt="">
            <span>Steam</span>
        </a>

        <a href="#">
            <img src="xbox.svg" alt="">
            <span>Xbox</span>
        </a>

        <a href="#">
            <img src="xbox.svg" alt="">
            <span>Xbox on PC</span>
        </a>

        <a href="#">
            <img src="epic.svg" alt="">
            <span>Epic Games</span>
        </a>

        <a href="#">
            <img src="gog.svg" alt="">
            <span>GOG.com</span>
        </a>

    </div>

</div>

    </section>

</body>
</html>
